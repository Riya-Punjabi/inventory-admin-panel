<header class="app-header">
    <button class="menu-button" type="button" aria-label="Open navigation" (click)="menuToggle.emit()">
        <i class="pi pi-bars"></i>
    </button>

    <div class="header-copy">
        <span>Signed in as</span>
        <strong>
            {{ profile?.login_name || 'User' }} | {{ profile?.role_name || 'Admin' }}
        </strong>
    </div>

    <button pButton type="button" severity="danger" size="small" outlined (click)="logout()">
        <i class="pi pi-sign-out me-2"></i>
        Logout
    </button>
</header>
