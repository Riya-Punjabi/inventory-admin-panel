<header class="app-header">

    <div class="header-copy">
        <strong>
            {{ profile?.login_name || 'User' }}
            ·
            {{ profile?.role_name || 'Admin' }}

    </div>

    <button pButton type="button" severity="danger" size="small" outlined (click)="logout()">

    </button>

</header>
