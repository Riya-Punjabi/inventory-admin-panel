<aside class="sidebar" aria-label="Primary">

    <div class="brand">
        <span class="brand-mark">
            {{ profileRes?.business_name?.charAt(0) }}
        </span>

        <div>
            <strong>{{ profileRes?.business_name }}</strong>
        </div>

    </div>

    <nav class="nav-list">

        <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            (click)="navigate.emit()">
            <i class="pi pi-home"></i>
            <span>Dashboard</span>
        </a>
        
        <a routerLink="/admin/opening-stock" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            (click)="navigate.emit()">
            <i class="pi pi-box"></i>
            <span>Opening Stock</span>
        </a>

        <a routerLink="/admin/opening-stock/new" routerLinkActive="active" (click)="navigate.emit()">
            <i class="pi pi-plus-circle"></i>
            <span>New Stock</span>
        </a>
    </nav>

</aside>
